// =================
// learning.proto
syntax = "proto3";

package learning.v1;

option go_package = "github.com/ImamTry257/lms-proto-learning/gen/go/learning;learningpbv1";

import "google/protobuf/timestamp.proto";

// CLASS
message ListClassRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
}

message ClassRequest {
    string uuid = 1;
    string merchant_id = 2;
    string name = 3;
    string code = 4;
    int32 is_free = 5;
    string description = 6;
    string status = 7;
    string created_by = 8;
    string updated_by = 9; 
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp deleted_at = 12;
}

message ClassResponse {
    string uuid = 1;
    string merchant_id = 2;
    string name = 3;
    string code = 4;
    int32 is_free = 5;
    string description = 6;
    string status = 7;
    string created_by = 8;
    string updated_by = 9; 
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp deleted_at = 12;
}


message ClassNameResponse {
    string uuid = 1;
    string name = 2;
}

message ListClassNameResponse {
    repeated ClassNameResponse data = 1;
}

message ListClassResponse {
    repeated ClassResponse data = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// LESSON
message ListLessonRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
}

message LessonRequest {
    string uuid = 1;
    string merchant_id = 2;
    string class_id = 3;
    string title = 4;
    string code = 5;
    string description = 76;
    string status = 7;
    string created_by = 8;
    string updated_by = 9; 
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp deleted_at = 12;
}

message LessonResponse {
    string uuid = 1;
    string merchant_id = 2;
    string class_id = 3;
    string title = 4;
    string code = 5;
    string description = 76;
    string status = 7;
    string created_by = 8;
    string updated_by = 9; 
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp deleted_at = 12;
}

message LessonNameResponse {
    string uuid = 1;
    string name = 2;
}

message ListLessonNameResponse {
    repeated LessonNameResponse data = 1;
}

message ListLessonResponse {
    repeated LessonResponse data = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// LESSON ITEM
message ListLessonItemRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
    string lesson_id = 5;
}

message LessonItemRequest {
    string uuid = 1;
    string lesson_id = 2;
    string class_id = 3;
    string title = 4;
    string code = 5;
    string description = 76;
    string status = 7;
    string created_by = 8;
    string updated_by = 9; 
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp deleted_at = 12;
}

message LessonItemResponse {
    string uuid = 1;
    string lesson_id = 2;
    string class_id = 3;
    string title = 4;
    string code = 5;
    string description = 76;
    string status = 7;
    string created_by = 8;
    string updated_by = 9; 
    google.protobuf.Timestamp created_at = 10;
    google.protobuf.Timestamp updated_at = 11;
    google.protobuf.Timestamp deleted_at = 12;
}

message LessonItemNameResponse {
    string uuid = 1;
    string name = 2;
}

message ListLessonItemNameResponse {
    repeated LessonNameResponse data = 1;
}

message ListLessonItemResponse {
    repeated LessonResponse data = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// CONTENT
message ListContentRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
}

message ContentRequest {
    string uuid = 1;
    string merchant_id = 2;
    string class_id = 3;
    string lesson_id = 4;
    string title = 5;
    string slug = 6;
    string description = 7;
    int32 count_click = 8;
    string status = 9;
    int32 is_deleted = 10;
    string created_by = 11;
    string updated_by = 12; 
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;
    google.protobuf.Timestamp deleted_at = 15;
}

message ContentResponse {
    string uuid = 1;
    string merchant_id = 2;
    string class_id = 3;
    string lesson_id = 4;
    string title = 5;
    string slug = 6;
    string description = 7;
    int32 count_click = 8;
    string status = 9;
    int32 is_deleted = 10;
    string created_by = 11;
    string updated_by = 12; 
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;
    google.protobuf.Timestamp deleted_at = 15;
}

message ContentNameResponse {
    string uuid = 1;
    string title = 2;
}

message ListContentNameResponse {
    repeated ContentNameResponse data = 1;
}

message ListContentResponse {
    repeated ContentResponse data = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// CONTENT CATEGORIES
message ListContentCategoriesRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
}

message ContentCategoriesRequest {
    string uuid = 1;
    string merchant_id = 2;
    string class_id = 3;
    string lesson_id = 4;
    string title = 5;
    string slug = 6;
    string description = 7;
    string status = 8;
    int32 is_deleted = 9;
    string created_by = 10;
    string updated_by = 11; 
    google.protobuf.Timestamp created_at = 12;
    google.protobuf.Timestamp updated_at = 13;
    google.protobuf.Timestamp deleted_at = 14;
}

message ContentCategoriesResponse {
    string uuid = 1;
    string merchant_id = 2;
    string class_id = 3;
    string lesson_id = 4;
    string title = 5;
    string slug = 6;
    string description = 7;
    string status = 8;
    int32 is_deleted = 9;
    string created_by = 10;
    string updated_by = 11; 
    google.protobuf.Timestamp created_at = 12;
    google.protobuf.Timestamp updated_at = 13;
    google.protobuf.Timestamp deleted_at = 14;
}

message ContentCategoriesNameResponse {
    string uuid = 1;
    string title = 2;
}

message ListContentCategoriesNameResponse {
    repeated ContentCategoriesNameResponse data = 1;
}

message ListContentCategoriesResponse {
    repeated ContentCategoriesResponse data = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}


message ActionResponse {
    bool is_success = 1;
}

message GetByIdRequest {
    string id = 1;
}

message GetByUuidRequest {
    string id_ = 1;
}


service ClassService {
    // Class
    rpc GetAll(ListClassRequest) returns (ListClassResponse);
    rpc GetAllClassName(ListClassRequest) returns (ListClassNameResponse);
    rpc Create(ClassRequest) returns (ActionResponse);
    rpc Update(ClassRequest) returns (ActionResponse);
    rpc GetById(GetByIdRequest) returns (ClassResponse);
    rpc GetByUuid(GetByUuidRequest) returns (ClassResponse);
    rpc Delete(GetByUuidRequest) returns (ActionResponse);

    // Lesson
    rpc GetAllLesson(ListLessonRequest) returns (ListLessonRequest);
    rpc GetAllLessonName(ListLessonRequest) returns (ListLessonNameResponse);
    rpc CreateLesson(ClassRequest) returns (ActionResponse);
    rpc UpdateLesson(ClassRequest) returns (ActionResponse);
    rpc GetLessonById(GetByIdRequest) returns (LessonResponse);
    rpc GetLessonByUuid(GetByUuidRequest) returns (LessonResponse);
    rpc DeleteLesson(GetByUuidRequest) returns (ActionResponse);

    // Lesson Item
    rpc GetAllLessonItem(ListLessonItemRequest) returns (ListLessonItemRequest);
    rpc GetAllLessonItemName(ListLessonItemRequest) returns (ListLessonItemNameResponse);
    rpc CreateLessonItem(ClassRequest) returns (ActionResponse);
    rpc UpdateLessonItem(ClassRequest) returns (ActionResponse);
    rpc GetLessonItemById(GetByIdRequest) returns (LessonItemResponse);
    rpc GetLessonItemByUuid(GetByUuidRequest) returns (LessonItemResponse);
    rpc DeleteLessonItem(GetByUuidRequest) returns (ActionResponse);

    // Content
    rpc GetAllContent(ListContentRequest) returns (ListContentRequest);
    rpc GetAllContentName(ListContentRequest) returns (ListContentNameResponse);
    rpc CreateContent(ClassRequest) returns (ActionResponse);
    rpc UpdateContent(ClassRequest) returns (ActionResponse);
    rpc GetContentById(GetByIdRequest) returns (ContentResponse);
    rpc GetContentByUuid(GetByUuidRequest) returns (ContentResponse);
    rpc DeleteContent(GetByUuidRequest) returns (ActionResponse);

    // ContentCategories
    rpc GetAllContentCategories(ListContentCategoriesRequest) returns (ListContentCategoriesRequest);
    rpc GetAllContentCategoriesName(ListContentCategoriesRequest) returns (ListContentCategoriesNameResponse);
    rpc CreateContentCategories(ClassRequest) returns (ActionResponse);
    rpc UpdateContentCategories(ClassRequest) returns (ActionResponse);
    rpc GetContentCategoriesById(GetByIdRequest) returns (ContentCategoriesResponse);
    rpc GetContentCategoriesByUuid(GetByUuidRequest) returns (ContentCategoriesResponse);
    rpc DeleteContentCategories(GetByUuidRequest) returns (ActionResponse);
}