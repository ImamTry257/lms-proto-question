// =================
// question.proto
syntax = "proto3";

package question.v2;

option go_package = "github.com/ImamTry257/lms-proto-question/gen/go/question;questionpbv2";

import "google/protobuf/timestamp.proto";

// Question
message ListQuestionRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
}

message GetQuestionByIdRequest {
    int32 id = 1;
}

message GetQuestionByUuidRequest {
    string id_ = 1;
}

message QuestionRequest {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    int32 number = 6;
    string description = 7;
    string options = 8;
    string options_with_reason = 9;
    string status = 10;
    string created_by = 11;
    string updated_by = 12; 
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;
    google.protobuf.Timestamp deleted_at = 15;
}

message QuestionResponse {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    int32 number = 6;
    string description = 7;
    string options = 8;
    string options_with_reason = 9;
    string status = 10;
    string created_by = 11;
    string updated_by = 12; 
    google.protobuf.Timestamp created_at = 13;
    google.protobuf.Timestamp updated_at = 14;
    google.protobuf.Timestamp deleted_at = 15;
    repeated QuestionAnswerKeyResponse question_answer_keys = 16;
    repeated QuestionSettingResponse question_settings = 17;
}

message ListQuestionResponse {
    repeated QuestionResponse contents = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// Question Setting
message ListQuestionSettingRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
}

message GetQuestionSettingByIdRequest {
    int32 id = 1;
}

message GetQuestionSettingByUuidRequest {
    string id_ = 1;
}

message QuestionSettingRequest {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    string question_master_id = 6;
    string title = 7;
    string duration = 8;
    string options = 9;
    string options_with_reason = 10;
    string status = 11;
    string created_by = 12;
    string updated_by = 13; 
    google.protobuf.Timestamp created_at = 14;
    google.protobuf.Timestamp updated_at = 15;
    google.protobuf.Timestamp deleted_at = 16;
}

message QuestionSettingResponse {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    string question_master_id = 6;
    string number = 7;
    string duration = 8;
    string options = 9;
    string options_with_reason = 10;
    string status = 11;
    string created_by = 12;
    string updated_by = 13; 
    google.protobuf.Timestamp created_at = 14;
    google.protobuf.Timestamp updated_at = 15;
    google.protobuf.Timestamp deleted_at = 16;
}

message ListQuestionSettingResponse {
    repeated QuestionSettingResponse contents = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// Question Answer Key
message ListQuestionAnswerKeyRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
    string merchant_id = 5;
    string class_id = 6;
    string lesson_id = 7;
}

message GetQuestionAnswerKeyByIdRequest {
    int32 id = 1;
}

message GetQuestionAnswerKeyByUuidRequest {
    string id_ = 1;
}

message QuestionAnswerKeyRequest {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    string question_master_id = 6;
    string title = 7;
    string duration = 8;
    string options = 9;
    string options_with_reason = 10;
    string status = 11;
    string created_by = 12;
    string updated_by = 13; 
    google.protobuf.Timestamp created_at = 14;
    google.protobuf.Timestamp updated_at = 15;
    google.protobuf.Timestamp deleted_at = 16;
}

message QuestionAnswerKeyResponse {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    string question_master_id = 6;
    string number = 7;
    string duration = 8;
    string options = 9;
    string options_with_reason = 10;
    string status = 11;
    string created_by = 12;
    string updated_by = 13; 
    google.protobuf.Timestamp created_at = 14;
    google.protobuf.Timestamp updated_at = 15;
    google.protobuf.Timestamp deleted_at = 16;
}

message ListQuestionAnswerKeyResponse {
    repeated QuestionAnswerKeyResponse contents = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

// Question Answer User
message ListQuestionAnswerUserRequest {
    int32 page = 1;
    int32 size = 2;
    string search = 3;
    string status = 4;
    string merchant_id = 5;
    string class_id = 6;
    string lesson_id = 7;
    string question_master_id = 8;
}

message GetQuestionAnswerUserByIdRequest {
    int32 id = 1;
}

message GetQuestionAnswerUserByUuidRequest {
    string id_ = 1;
}

message QuestionAnswerUserRequest {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    string question_master_id = 6;
    string user_id = 7;
    string type = 8;
    string answer = 9;
    string answer_with_reason = 10;
    int32 is_answered = 11;
    int32 score = 12;
    string status = 13;
    string created_by = 14;
    string updated_by = 15; 
    google.protobuf.Timestamp created_at = 16;
    google.protobuf.Timestamp updated_at = 17;
    google.protobuf.Timestamp deleted_at = 18;
}

message QuestionAnswerUserResponse {
    string uuid = 1;
    string name = 2;
    string merchant_id = 3;
    string class_id = 4;
    string lesson_id = 5;
    string question_master_id = 6;
    string user_id = 7;
    string type = 8;
    string answer = 9;
    string answer_with_reason = 10;
    int32 is_answered = 11;
    int32 score = 12;
    string status = 13;
    string created_by = 14;
    string updated_by = 15; 
    google.protobuf.Timestamp created_at = 16;
    google.protobuf.Timestamp updated_at = 17;
    google.protobuf.Timestamp deleted_at = 18;
}

message ListQuestionAnswerUserResponse {
    repeated QuestionAnswerUserResponse contents = 1;
    int32 page = 2;
    int32 size = 3;
    int32 total_items = 4;
    int32 total_pages = 5;
}

message QuestionNameResponse {
    string uuid = 1;
    string name = 2;
}

message ListQuestionNameResponse {
    repeated QuestionNameResponse data = 1;
}

message ActionQuestionResponse {
    bool is_success = 1;
}

message GetQuestionPICByUuidRequest {
    string id_ = 1;
}

service QuestionService {
    // Question
    rpc GetAll(ListQuestionRequest) returns (ListQuestionResponse);
    rpc GetAllQuestionName(ListQuestionRequest) returns (ListQuestionNameResponse);
    rpc Create(QuestionRequest) returns (ActionQuestionResponse);
    rpc Update(QuestionRequest) returns (ActionQuestionResponse);
    rpc GetById(GetQuestionByIdRequest) returns (QuestionResponse);
    rpc GetByUuid(GetQuestionByUuidRequest) returns (QuestionResponse);
    rpc Delete(GetQuestionByUuidRequest) returns (ActionQuestionResponse);

    // Question Setting
    rpc GetAllSetting(ListQuestionSettingRequest) returns (ListQuestionSettingResponse);
    rpc CreateSetting(QuestionSettingRequest) returns (ActionQuestionResponse);
    rpc UpdateSetting(QuestionSettingRequest) returns (ActionQuestionResponse);
    rpc GetSettingById(GetQuestionSettingByIdRequest) returns (QuestionSettingResponse);
    rpc GetSettingByUuid(GetQuestionSettingByUuidRequest) returns (QuestionSettingResponse);
    rpc DeleteSetting(GetQuestionSettingByUuidRequest) returns (ActionQuestionResponse);

    // Question Answer Key
    rpc GetAllAnswerKey(ListQuestionAnswerKeyRequest) returns (ListQuestionAnswerKeyResponse);
    rpc CreateAnswerKey(QuestionAnswerKeyRequest) returns (ActionQuestionResponse);
    rpc UpdateAnswerKey(QuestionAnswerKeyRequest) returns (ActionQuestionResponse);
    rpc GetAnswerKeyById(GetQuestionAnswerKeyByIdRequest) returns (QuestionAnswerKeyResponse);
    rpc GetAnswerKeyByUuid(GetQuestionAnswerKeyByUuidRequest) returns (QuestionAnswerKeyResponse);
    rpc DeleteAnswerKey(GetQuestionAnswerKeyByUuidRequest) returns (ActionQuestionResponse);

    // Question Answer User
    rpc GetAllAnswerUser(ListQuestionAnswerUserRequest) returns (ListQuestionAnswerUserResponse);
    rpc GetAnswerUserById(GetQuestionAnswerUserByIdRequest) returns (QuestionAnswerUserResponse);
    rpc GetAnswerUserByUuid(GetQuestionAnswerUserByUuidRequest) returns (QuestionAnswerUserResponse);
}